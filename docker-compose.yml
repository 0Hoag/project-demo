services:
  postgres:
    image: postgres:16
    container_name: project_demo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_demo"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
